services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: northline
      POSTGRES_PASSWORD: northline
      POSTGRES_DB: northline
    ports:
      - "5433:5432"
    volumes:
      - northline_data:/var/lib/postgresql/data
  app:
    build: .
    profiles: ["production"]
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://northline:northline@db:5432/northline?schema=public
      AUTH_SECRET: change-me-in-production
      AUTH_URL: http://localhost:3100
    depends_on: [db]
volumes:
  northline_data:
